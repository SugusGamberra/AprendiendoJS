<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Integración con JS</title>
        <!-- Para poner el estilo lo hacemos aqui -->
        <style>
            .detalles {display: none;}
            .interactivo:hover {cursor: pointer; text-decoration: underline;}
        </style>
    </head>

    <body>
        <h1 id="titulo">Hola!</h1>
        <button id="cambiarTitulo">Cambiar el título</button>

        <!-- Para hacer una libreria -->
        <h1 class="interactivo">Libreria en linea</h1>
        <h2 id="libroDelMes" class="interactivo">Libro de Marzo</h2>
        <button id="mostrarDetalles" onclick="toggleDetalles()">Mostrar mas detalles</button>

        <div id="detalles" class="detalles">
            <p><strong>Autor: </strong>Juan Pérez</p>
            <p><strong>Descripcion: </strong>Libro muy divertido</p>
        </div>

        <!-- Para integrar JS al final del body es donde se mete -->
        <script src="script.js"></script>
    </body>
</html>
